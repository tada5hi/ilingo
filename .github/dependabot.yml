version: 2
updates:
    # Maintain dependencies for GitHub Actions
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "daily"

    # Maintain dependencies for npm
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "daily"
      versioning-strategy: "increase"
      target-branch: "master"
      open-pull-requests-limit: 20
      commit-message:
          prefix: "fix"
          prefix-development: "build"
          include: "scope"
      groups:
          # New build/test toolchain — bumps land together so CI runs once.
          toolchain:
              applies-to: version-updates
              patterns:
                  - "tsdown"
                  - "unplugin-vue"
                  - "vitest"
                  - "@vitest/*"
                  - "eslint"
                  - "typescript-eslint"
                  - "@tada5hi/eslint-config"
                  - "vue-tsc"
                  - "typescript"
                  - "@tada5hi/tsconfig"
                  - "@tada5hi/commitlint-config"
              update-types:
                  - "patch"
                  - "minor"
                  - "major"
          majorProd:
              applies-to: version-updates
              dependency-type: production
              update-types:
                  - "major"
          majorDev:
              applies-to: version-updates
              dependency-type: development
              update-types:
                  - "major"
          minorAndPatch:
              applies-to: version-updates
              update-types:
                  - "patch"
                  - "minor"
